<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BrajYatra — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1A1208;
      color: #F5EDD6;
      font-family: 'Montserrat', -apple-system, sans-serif;
      padding: 2rem;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .icon { font-size: 4rem; margin-bottom: 1.5rem; }
    h1 { font-size: 1.75rem; margin-bottom: 0.75rem; font-weight: 700; }
    p { color: #C4A882; font-size: 0.95rem; line-height: 1.6; margin-bottom: 2rem; }
    button {
      background: linear-gradient(135deg, #C0622D, #D4780A);
      color: white;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover { box-shadow: 0 4px 20px rgba(192,98,45,0.4); transform: translateY(-1px); }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🙏</div>
    <h1>You're Offline</h1>
    <p>It seems you've lost your internet connection. Please check your connection and try again to continue your Braj Yatra.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
